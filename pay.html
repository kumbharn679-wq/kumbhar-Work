<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      flex-direction: column;
        gap: 15px;
        background-image: linear-gradient(to bottom, #edd5d5, #c3cba6);
    }
    img{
        height: 400px;
        width: 400px;
    }
    h1{
        font-size: 36px;
      color: #FFFFFF;
background: #333333;
text-shadow: #FFF 0px 0px 5px, #FFF 0px 0px 10px, #FFF 0px 0px 15px, #FF2D95 0px 0px 20px, #FF2D95 0px 0px 30px, #FF2D95 0px 0px 40px, #FF2D95 0px 0px 50px, #FF2D95 0px 0px 75px;
    }
    button{
        padding: 10px 20px;
        font-size: 18px;
        background-color: #a4f2ce;
        color: #f76280;
        border: none;
        cursor: pointer;
        text-shadow: #FFF 0px 0px 5px, #FFF 0px 0px 10px, #FFF 0px 0px 15px, #edbbd4 0px 0px 20px, #ecbed5 0px 0px 30px, #f6c7de 0px 0px 40px, #fcc8e2 0px 0px 50px, #000000 0px 0px 75px;
    }
     button:hover {
      background-color: #bcebef;
    }
  </style>
</head>

<body>
    <button>buy now</button>
    <h1>🙏THANK YOU🙏</h1>
</body>
</html>
